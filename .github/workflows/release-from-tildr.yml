name: Release from Tildr

on:
  schedule:
    - cron: '0 0 * * 6'   # every Saturday at 00:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.compare.outputs.new_tag }}
      should_build: ${{ steps.compare.outputs.should_build }}
    steps:
      - name: Get latest tildr release
        id: tildr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(gh release view --repo orbitbits/tildr --json tagName -q .tagName 2>/dev/null || echo "")
          if [ -z "$TAG" ]; then
            echo "No release found on orbitbits/tildr"
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Latest tildr release: ${TAG}"
          echo "new_tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Check if already published here
        id: compare
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tildr.outputs.new_tag }}"
          if [ -z "$TAG" ]; then
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if gh release view "$TAG" --repo "${{ github.repository }}" &>/dev/null; then
            echo "Release ${TAG} already exists here — skipping"
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "New release detected: ${TAG}"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "new_tag=${TAG}" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    container: ubuntu:stable

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y dpkg-dev curl git make

      - name: Build DEB
        env:
          PKGVER: ${{ needs.check.outputs.new_tag }}
        run: make build

      - name: Lint DEB
        continue-on-error: true
        run: |
          apt-get install -y lintian
          make lint

      - name: Collect DEBs
        run: |
          mkdir -p debs
          cp debbuild/*.deb debs/ 2>/dev/null || true
          echo "Built DEBs:"
          ls -la debs/

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-ubuntu
          path: debs/*.deb
          retention-days: 5

  release:
    needs: [check, build]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all DEB artifacts
        uses: actions/download-artifact@v4
        with:
          path: debs/
          pattern: deb-ubuntu
          merge-multiple: true

      - name: List DEBs
        run: |
          echo "Downloaded DEBs:"
          find debs/ -name "*.deb" -exec ls -lh {} \;

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.check.outputs.new_tag }}"
          gh release create "$TAG" \
            --title "Release ${TAG}" \
            --generate-notes \
            debs/*.deb

  publish:
    needs: [check, release]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev gnupg

      - name: Import GPG key
        id: gpg
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          FPR=$(gpg --list-secret-keys --with-colons | awk -F: '/^fpr:/{print $10; exit}')
          if [ -z "$FPR" ]; then
            echo "::error::No GPG secret key found after import"
            exit 1
          fi
          echo "fingerprint=$FPR" >> "$GITHUB_OUTPUT"

      - name: Download DEBs from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.check.outputs.new_tag }}"
          mkdir -p tmp-debs
          gh release download "$TAG" -p "*.deb" -D tmp-debs/ --skip-existing
          echo "Downloaded DEBs:"
          ls -la tmp-debs/

      - name: Setup repo and copy DEBs
        run: |
          mkdir -p repo/pool/main
          for codename in stable; do
            mkdir -p "repo/dists/${codename}/main/binary-amd64"
          done
          cp tmp-debs/*.deb repo/pool/main/ 2>/dev/null || true
          echo "Pool contents:"
          ls -la repo/pool/main/

      - name: Generate repository metadata
        run: |
          for codename in stable; do
            dir="repo/dists/${codename}/main/binary-amd64"
            echo "Creating repo metadata for Ubuntu ${codename}..."
            dpkg-scanpackages --arch amd64 repo/pool/ /dev/null > "${dir}/Packages"
            gzip -9 -k -f "${dir}/Packages"

            cat > "repo/dists/${codename}/Release" <<EOF
          Origin: Tildr
          Label: Tildr APT Repository
          Suite: stable
          Codename: ${codename}
          Architectures: amd64
          Components: main
          Description: APT repository for Tildr
          Date: $(date -Ru)
          EOF
          done

      - name: Sign Release files
        run: |
          echo "${{ secrets.GPG_PASSPHRASE }}" > /tmp/.gpg-passphrase

          for codename in stable; do
            release_file="repo/dists/${codename}/Release"
            if [ -f "$release_file" ]; then
              echo "Signing Release -> InRelease for ${codename}..."
              gpg --batch \
                --pinentry-mode loopback \
                --passphrase-file /tmp/.gpg-passphrase \
                --local-user "${{ steps.gpg.outputs.fingerprint }}" \
                --yes --clearsign -o "repo/dists/${codename}/InRelease" "$release_file"

              echo "Signing Release -> Release.gpg for ${codename}..."
              gpg --batch \
                --pinentry-mode loopback \
                --passphrase-file /tmp/.gpg-passphrase \
                --local-user "${{ steps.gpg.outputs.fingerprint }}" \
                --yes -abs -o "repo/dists/${codename}/Release.gpg" "$release_file"
            fi
          done
          rm -f /tmp/.gpg-passphrase

      - name: Export public key
        run: |
          gpg --batch --yes --export -a "${{ steps.gpg.outputs.fingerprint }}" > repo/tildr-deb-pub.gpg
          if [ ! -s repo/tildr-deb-pub.gpg ]; then
            echo "::error::Exported GPG public key file is empty"
            exit 1
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: repo
          keep_files: true
          destination_dir: .
