name: Publish APT Repository

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (e.g. v0.1.0)'
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev apt-utils gnupg

      - name: Import GPG key
        id: gpg
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          # Capture the fingerprint of the key we just imported instead of
          # matching it later by a hardcoded user-id string. Filtering by
          # name later is fragile: if the string doesn't match the key's
          # actual User ID, `gpg --export` finds nothing, exits 0, and
          # silently produces an empty file.
          FPR=$(gpg --list-secret-keys --with-colons | awk -F: '/^fpr:/{print $10; exit}')
          if [ -z "$FPR" ]; then
            echo "::error::No GPG secret key found after import"
            exit 1
          fi
          echo "fingerprint=$FPR" >> "$GITHUB_OUTPUT"

      - name: Determine tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download DEBs from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          mkdir -p tmp-debs
          gh release download "$TAG" -p "*.deb" -D tmp-debs/ --skip-existing
          echo "Downloaded DEBs:"
          ls -la tmp-debs/

      - name: Setup repo structure
        run: |
          mkdir -p repo/pool/main
          for codename in stable; do
            mkdir -p "repo/dists/${codename}/main/binary-amd64"
          done

      - name: Copy DEBs to repo
        run: |
          cp tmp-debs/*.deb repo/pool/main/ 2>/dev/null || true
          echo "Pool contents:"
          ls -la repo/pool/main/

      - name: Generate repository metadata
        run: |
          cd repo
          for codename in stable; do
            dir="dists/${codename}/main/binary-amd64"
            echo "Creating Packages for ${codename}..."
            dpkg-scanpackages --arch amd64 pool/ /dev/null > "${dir}/Packages"
            gzip -9 -k -f "${dir}/Packages"
          done

          for codename in stable; do
            echo "Creating Release with hashes for ${codename}..."
            apt-ftparchive \
              -o APT::FTPArchive::Release::Origin="Tildr" \
              -o APT::FTPArchive::Release::Label="Tildr APT Repository" \
              -o APT::FTPArchive::Release::Suite="${codename}" \
              -o APT::FTPArchive::Release::Codename="${codename}" \
              -o APT::FTPArchive::Release::Architectures="amd64" \
              -o APT::FTPArchive::Release::Components="main" \
              -o APT::FTPArchive::Release::Description="APT repository for Tildr" \
              release "dists/${codename}" > "dists/${codename}/Release"
          done

      - name: Sign Release files
        run: |
          echo "${{ secrets.GPG_PASSPHRASE }}" > /tmp/.gpg-passphrase

          for codename in stable; do
            release_file="repo/dists/${codename}/Release"
            if [ -f "$release_file" ]; then
              echo "Signing Release -> InRelease for ${codename}..."
              gpg --batch \
                --pinentry-mode loopback \
                --passphrase-file /tmp/.gpg-passphrase \
                --local-user "${{ steps.gpg.outputs.fingerprint }}" \
                --yes --clearsign -o "repo/dists/${codename}/InRelease" "$release_file"

              echo "Signing Release -> Release.gpg for ${codename}..."
              gpg --batch \
                --pinentry-mode loopback \
                --passphrase-file /tmp/.gpg-passphrase \
                --local-user "${{ steps.gpg.outputs.fingerprint }}" \
                --yes -abs -o "repo/dists/${codename}/Release.gpg" "$release_file"
            fi
          done
          rm -f /tmp/.gpg-passphrase

      - name: Export public key
        run: |
          gpg --batch --yes --export -a "${{ steps.gpg.outputs.fingerprint }}" > repo/tildr-deb-pub.gpg
          if [ ! -s repo/tildr-deb-pub.gpg ]; then
            echo "::error::Exported GPG public key file is empty"
            exit 1
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: repo
          keep_files: true
          destination_dir: .
