name: Publish APT Repository

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (e.g. v0.1.0)'
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev gnupg

      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import

      - name: Determine tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup repo structure
        run: |
          mkdir -p repo/pool/main
          for codename in noble oracular; do
            mkdir -p "repo/dists/${codename}/main/binary-amd64"
          done

      - name: Download DEB from release
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          gh release download "$TAG" -p "*.deb" -D repo/pool/main/ --skip-existing
          echo "Downloaded DEBs:"
          ls -la repo/pool/main/

      - name: Generate repository metadata
        run: |
          for codename in noble oracular; do
            dir="repo/dists/${codename}/main/binary-amd64"
            echo "Creating repo metadata for Ubuntu ${codename}..."
            dpkg-scanpackages --arch amd64 repo/pool/ /dev/null > "${dir}/Packages"
            gzip -9 -k -f "${dir}/Packages"

            cat > "repo/dists/${codename}/Release" <<EOF
          Origin: Tildr
          Label: Tildr APT Repository
          Suite: stable
          Codename: ${codename}
          Architectures: amd64
          Components: main
          Description: APT repository for Tildr
          Date: $(date -Ru)
          EOF
          done

      - name: Sign packages
        run: |
          for codename in noble oracular; do
            packages_gz="repo/dists/${codename}/main/binary-amd64/Packages.gz"
            if [ -f "$packages_gz" ]; then
              echo "Signing: $packages_gz"
              echo "${{ secrets.GPG_PASSPHRASE }}" | gpg --batch \
                --pinentry-mode loopback \
                --passphrase-fd 0 \
                --yes --detach-sign --armor "$packages_gz"
            fi
          done

      - name: Export public key
        run: |
          gpg --batch --pinentry-mode loopback \
            --passphrase-fd 0 \
            --yes --export -a 'Tildr Signing Key' > repo/GPG-KEY-tildr

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: repo
          keep_files: true
          destination_dir: .
